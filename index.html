<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEN WISE LANGUAGE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF9E6, #FFE4B5, #FFFFFF);
            font-family: 'Poppins', sans-serif;
            color: #000000;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        nav {
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
            margin-bottom: 20px;
            position: sticky;
            top: 6px;
            z-index: 1000;
        }
        nav .logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: #FFFFFF;
            letter-spacing: 1px;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: #FFFFFF;
            font-weight: 500;
            font-size: 16px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: background 0.3s ease, color 0.3s ease, transform 0.2s ease;
        }
        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #FFF9E6;
            transform: translateY(-2px);
        }
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }
        .nav-toggle span,
        .nav-toggle span::before,
        .nav-toggle span::after {
            display: block;
            background: #FFFFFF;
            height: 3px;
            width: 25px;
            border-radius: 3px;
            position: relative;
            transition: all 0.3s ease;
        }
        .nav-toggle span::before,
        .nav-toggle span::after {
            content: '';
            position: absolute;
            left: 0;
        }
        .nav-toggle span::before { top: -8px; }
        .nav-toggle span::after { top: 8px; }
        .nav-toggle.open span { background: transparent; }
        .nav-toggle.open span::before { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.open span::after { transform: rotate(-45deg) translate(5px, -5px); }

        @media (max-width: 768px) {
            .nav-links {
                position: absolute; top: 70px; right: 20px;
                background: linear-gradient(135deg, #FFD700, #FF8C00);
                flex-direction: column; align-items: flex-start; padding: 1.5rem;
                border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,.2); display: none; width: 200px;
            }
            .nav-links.open { display: flex; }
            .nav-links a { width: 100%; text-align: center; padding: 10px; font-size: 14px; }
            .nav-toggle { display: block; }
        }

        h1 { font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 700; color: #000; margin-bottom: .2rem; text-align: center; }
        h2 { font-family: 'Poppins', sans-serif; font-size: 24px; font-weight: 500; color: #000; margin-top: .2rem; margin-bottom: 1.8rem; text-align: center; }

        .unit-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .unit {
            background: linear-gradient(135deg, #FFF9E6, #FFE4B5, #FFFFFF);
            padding: 2rem; border-radius: 15px; border: 2px solid #FFD700;
            box-shadow: 0 6px 12px rgba(0,0,0,.1); cursor: pointer;
            transition: transform .3s, box-shadow .3s; text-align: center; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between; 
        }
        .unit:hover { transform: scale(1.03); box-shadow: 0 8px 16px rgba(0,0,0,.15); }

        .zodiac-box {
            position: relative; width: 80px; height: 80px; margin: 0 auto 1rem;
            background: linear-gradient(135deg, #FFD700, #FF8C00); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; font-size: 28px; font-weight: 700; color: #FFF;
            box-shadow: 0 4px 8px rgba(0,0,0,.2); overflow: hidden;
        }
        .theme-icon {
            position: absolute; font-size: 28px; color: rgba(255,255,255,0.7);
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .unit a { text-decoration: none; color: #000; font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; display: block; }
        .unit a:hover { color: #FF8C00; }
        .unit p { font-family: 'Poppins', sans-serif; font-size: 16px; color: #333; margin: .5rem 0; }
        .unit-icon, .vocab-icon { color: #FF8C00; margin-right: 8px; font-size: 20px; vertical-align: middle; }
        .vocabulary { display: flex; align-items: center; justify-content: center; margin-top: 10px; }
        .vocabulary a { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 500; color: #FF8C00; text-transform: uppercase; text-decoration: none; }
        .vocabulary a:hover { color: #FFD700; }

        .game-section {
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255, 140, 0, 0.3);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .game-link, .dialogue-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80%;
            padding: 10px 25px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.6);
            transition: all 0.3s ease;
        }
        .game-link {
            background: linear-gradient(45deg, #FF8C00, #FFD700);
        }
        .dialogue-link {
            background: linear-gradient(45deg, #00C9FF, #92FE9D);
            animation: pulse-glow 2s infinite alternate;
        }
        .game-link:hover, .dialogue-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 25px rgba(255, 140, 0, 1);
        }
        .game-icon { margin-right: 10px; font-size: 20px; color: #FFFFFF; }
    
        /* SIMPLE USER DISPLAY */
        .simple-user-display {
            background: rgba(255, 255, 255, 0.18);
            color: #FFFFFF;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.25);
            margin-left: 12px;
            display: none; /* Khởi tạo ẩn, chỉ hiện khi đã kiểm tra đăng nhập */
        }
        .simple-user-display .user-name {
            display: block;
            margin-bottom: 8px;
        }
        .simple-user-display .signout-btn {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        .simple-user-display .signout-btn:hover {
            background: #b71c1c;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .simple-user-display {
                font-size: 15.5px;
                padding: 14px 16px;
                margin-left: 8px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <div class="logo">GEN WISE LANGUAGE HUB</div>
        <button class="nav-toggle" aria-label="Toggle navigation"><span></span></button>
        <div class="nav-links">
            <!-- Simple User Display -->
            <div class="simple-user-display" id="simpleUserDisplay">
                <span class="user-name" id="userNameDisplay">Loading...</span>
                <button class="signout-btn" id="signOutBtnSimple">Sign Out</button>
            </div>
            <a href="index.html">Home</a>
            <a href="gioi thieu.html">About</a>

    <h2>Learning Units</h2>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
    import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBr5WUp7m6kEfzJur4HLqEMS6vCDKhgjyA",
        authDomain: "leo-english-hub.firebaseapp.com",
        databaseURL: "https://leo-english-hub-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "leo-english-hub",
        storageBucket: "leo-english-hub.firebasestorage.app",
        messagingSenderId: "297427422584",
        appId: "1:297427422584:web:258d3422070fd49dcecc8d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const dbFS = getFirestore(app);
    const dbRT = getDatabase(app);

    let currentSessionId = null;
    let sessionRef = null;
    let pollInterval = null;

    function showKickMessage() {
        document.body.innerHTML = `
            <div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:99999;">
                <div style="background:white;padding:50px 60px;border-radius:20px;text-align:center;max-width:520px;box-shadow:0 25px 60px rgba(0,0,0,0.6);">
                    <h1 style="color:#d32f2f;font-size:34px;margin:0 0 20px 0;">🚨 Đăng nhập ở thiết bị khác</h1>
                    <p style="font-size:19px;color:#333;line-height:1.7;margin-bottom:35px;">
                        TÀI KHOẢN CỦA BẠN ĐÃ ĐƯỢC ĐĂNG NHẬP Ở THIẾT BỊ KHÁC<br>
                        BẠN SẼ BỊ ĐĂNG XUẤT NGAY...
                    </p>
                </div>
            </div>
        `;
    }

    onAuthStateChanged(auth, (user) => {
        if (!user) return window.location.replace("index.html");

        // Rút gọn tên người dùng: Chỉ lấy phần ký tự đứng trước dấu '@' của Email
        if (user.email) {
            const shortenedName = user.email.split('@')[0];
            document.getElementById('userNameDisplay').textContent = shortenedName;
        } else {
            document.getElementById('userNameDisplay').textContent = 'User';
        }
        
        // Hiển thị khung thông tin user sau khi dữ liệu đã sẵn sàng
        document.getElementById('simpleUserDisplay').style.display = 'block';

        // Kiểm tra phân quyền truy cập level BEGINNER
        onSnapshot(doc(dbFS, "users", user.uid), (snap) => {
            if (!snap.exists() || !snap.data().accessibleLevels?.includes("BEGINNER")) {
                document.body.innerHTML = `<div style="position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;color:white;font-size:24px;text-align:center;padding:40px;">BẠN CHƯA ĐĂNG KÍ LEVEL NÀY.<br>VUI LÒNG LIÊN HỆ THẦY LEO!</div>`;
                return;
            }

            // Single Device - Thiết lập cơ chế quét phiên đăng nhập đa thiết bị
            currentSessionId = 'sess_' + Date.now() + Math.random().toString(36).substr(2,8);
            sessionRef = ref(dbRT, `sessions/${user.uid}`);

            set(sessionRef, {
                activeSessionId: currentSessionId,
                lastActive: Date.now()
            });

            // Tiến hành Poll kiểm tra đồng bộ mỗi 2 giây
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const snapshot = await get(child(ref(dbRT), `sessions/${user.uid}`));
                    const data = snapshot.val();
                    if (data && data.activeSessionId && data.activeSessionId !== currentSessionId) {
                        clearInterval(pollInterval);
                        showKickMessage();
                        setTimeout(() => {
                            signOut(auth).then(() => window.location.replace("index.html"));
                        }, 2500);
                    }
                } catch (e) {}
            }, 2000);
        });
    });

    document.getElementById('signOutBtnSimple').addEventListener('click', async () => {
        if (sessionRef) await remove(sessionRef);
        await signOut(auth);
        window.location.replace("index.html");
    });

    // Xử lý rút gọn menu trên Mobile
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    if (navToggle && navLinks) {
        navToggle.addEventListener('click', () => {
            navToggle.classList.toggle('open');
            navLinks.classList.toggle('open');
        });
    }
</script>
</body>
</html>
